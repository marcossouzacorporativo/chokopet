<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fatura — Choko Pet Shop</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --brand:#D85A30;--brand-dark:#993C1D;--brand-light:#FAECE7;
      --accent:#1D9E75;--accent-light:#E1F5EE;
      --bg:#F7F5F0;--surface:#fff;--border:#E2DED8;
      --text:#2C2C2A;--text-muted:#888780;
      --radius:10px;--shadow:0 2px 8px rgba(0,0,0,0.08);--shadow-lg:0 8px 24px rgba(0,0,0,0.13);
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px}
    .wrap{max-width:640px;margin:0 auto}
    .header{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px}
    .header img{width:64px;height:64px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .header h1{font-size:20px;font-weight:800;color:var(--brand)}
    .header p{font-size:12px;color:var(--text-muted);margin-top:2px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
    .card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}
    .info-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid #f5f3ef}
    .info-row:last-child{border-bottom:none}
    .info-label{color:var(--text-muted)}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
    td{padding:10px 10px;border-bottom:1px solid #f5f3ef;vertical-align:middle}
    .badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
    .badge-banho{background:#E6F1FB;color:#185FA5}
    .badge-tosa{background:#FAEEDA;color:#BA7517}
    .badge-banhotosa{background:#FAECE7;color:#993C1D}
    .badge-hospedagem{background:#E1F5EE;color:#0F6E56}
    .total-box{background:var(--accent-light);border:1px solid #5DCAA5;border-radius:var(--radius);padding:18px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .total-box .label{font-size:13px;color:#0F6E56;font-weight:600}
    .total-box .valor{font-size:26px;font-weight:800;color:#0F6E56}
    .status-paga{background:var(--accent-light);border:2px solid var(--accent);border-radius:var(--radius);padding:14px 20px;text-align:center;font-weight:700;font-size:15px;color:#0F6E56;margin-bottom:14px}
    .status-aberta{background:#FAEEDA;border:2px solid #BA7517;border-radius:var(--radius);padding:14px 20px;text-align:center;font-weight:700;font-size:15px;color:#BA7517;margin-bottom:14px}
    .footer{text-align:center;font-size:11px;color:var(--text-muted);margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error{text-align:center;padding:60px 20px;color:var(--text-muted)}
    .error .icon{font-size:48px;margin-bottom:12px}
    @media print{body{background:white;padding:0}.header{box-shadow:none}.card{box-shadow:none}}
  </style>
</head>
<body>
<div class="wrap">
  <div id="loading" style="text-align:center;padding:60px 0">
    <div class="spinner"></div>
    <p style="color:var(--text-muted);font-size:13px">Carregando fatura…</p>
  </div>
  <div id="content" style="display:none"></div>
</div>

<script>
const firebaseConfig = {
  apiKey:            "AIzaSyBHZKBIKQmwBsLu1A1MdCSdWMU3Y-eeAWE",
  authDomain:        "chokopet-55851.firebaseapp.com",
  projectId:         "chokopet-55851",
  storageBucket:     "chokopet-55851.firebasestorage.app",
  messagingSenderId: "887671939782",
  appId:             "1:887671939782:web:d086f99e81a31b13bc6dc7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const SERVICOS = {banho:'🚿 Banho',tosa:'✂️ Tosa',banhotosa:'🛁 Banho + Tosa',hospedagem:'🏨 Hospedagem'};
const fmtMoeda = v => 'R$ ' + (parseFloat(v)||0).toFixed(2).replace('.',',');
const fmtDate  = d => { if(!d) return '—'; const [a,m,dd]=d.split('-'); return `${dd}/${m}/${a}`; };
const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

async function carregar() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if(!id){ mostrarErro('Link inválido.'); return; }
  try {
    const snap = await db.collection('faturas').doc(id).get();
    if(!snap.exists){ mostrarErro('Fatura não encontrada.'); return; }
    const f = { id:snap.id, ...snap.data() };
    renderFatura(f);
  } catch(e) {
    mostrarErro('Erro ao carregar: ' + e.message);
  }
}

function renderFatura(f) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('content');
  el.style.display = 'block';

  const [ano,mm] = f.mes.split('-');
  const mesLabel = `${meses[parseInt(mm)-1]} de ${ano}`;
  const itensSorted = [...(f.itens||[])].sort((a,b)=>a.data.localeCompare(b.data));

  const statusHTML = f.status==='paga'
    ? `<div class="status-paga">✅ Fatura paga — Obrigado!</div>`
    : `<div class="status-aberta">⏳ Aguardando pagamento</div>`;

  el.innerHTML = `
    <div class="header">
      <img src="https://raw.githubusercontent.com/marcossouzacorporativo/chokopet/main/logo.png" alt="Choko Pet Shop"/>
      <div>
        <h1>Choko Pet Shop</h1>
        <p>Fatura de serviços — ${mesLabel}</p>
      </div>
    </div>

    ${statusHTML}

    <div class="card">
      <div class="card-title">👤 Dados do Cliente</div>
      <div class="info-row"><span class="info-label">Nome</span><strong>${f.clienteNome||'—'}</strong></div>
      <div class="info-row"><span class="info-label">Mês de referência</span><strong>${mesLabel}</strong></div>
      <div class="info-row"><span class="info-label">Total de itens</span><strong>${(f.itens||[]).length}</strong></div>
    </div>

    <div class="card">
      <div class="card-title">🐾 Serviços do Período</div>
      <div style="overflow-x:auto">
        <table>
          <tr><th>Data</th><th>Animal</th><th>Serviço</th><th>Valor</th></tr>
          ${itensSorted.filter(i=>!i.tipo||i.tipo==='servico').map(i=>`
            <tr>
              <td>${fmtDate(i.data)}<br><span style="font-size:11px;color:var(--text-muted)">${i.hora||''}</span></td>
              <td>${i.animal||'—'}</td>
              <td><span class="badge badge-${i.servico}">${SERVICOS[i.servico]||i.servico||'—'}</span></td>
              <td><strong>${fmtMoeda(i.valor)}</strong></td>
            </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:12px">Nenhum serviço</td></tr>'}
        </table>
      </div>
    </div>

    ${itensSorted.some(i=>i.tipo==='produto')?`
    <div class="card">
      <div class="card-title">🛒 Produtos Adquiridos</div>
      <div style="overflow-x:auto">
        <table>
          <tr><th>Data</th><th>Produto</th><th>Valor</th></tr>
          ${itensSorted.filter(i=>i.tipo==='produto').map(i=>`
            <tr>
              <td>${fmtDate(i.data)}</td>
              <td>${i.descricao||'—'}</td>
              <td><strong>${fmtMoeda(i.valor)}</strong></td>
            </tr>`).join('')}
        </table>
      </div>
    </div>`:''}

    ${itensSorted.some(i=>i.tipo==='medico')?`
    <div class="card">
      <div class="card-title">🏥 Atendimentos Médicos</div>
      <div style="overflow-x:auto">
        <table>
          <tr><th>Data</th><th>Descrição</th><th>Valor</th></tr>
          ${itensSorted.filter(i=>i.tipo==='medico').map(i=>`
            <tr>
              <td>${fmtDate(i.data)}</td>
              <td>${i.descricao||'—'}</td>
              <td><strong>${fmtMoeda(i.valor)}</strong></td>
            </tr>`).join('')}
        </table>
      </div>
    </div>`:''}

    ${itensSorted.some(i=>i.tipo==='hospedagem')?`
    <div class="card">
      <div class="card-title">🏨 Hospedagens</div>
      <div style="overflow-x:auto">
        <table>
          <tr><th>Data</th><th>Descrição</th><th>Valor</th></tr>
          ${itensSorted.filter(i=>i.tipo==='hospedagem').map(i=>`
            <tr>
              <td>${fmtDate(i.data)}</td>
              <td>${i.descricao||'—'}</td>
              <td><strong>${fmtMoeda(i.valor)}</strong></td>
            </tr>`).join('')}
        </table>
      </div>
    </div>`:''}

    <div class="total-box">
      <div class="label">💰 Total a pagar</div>
      <div class="valor">${fmtMoeda(f.total)}</div>
    </div>

    <div class="card" style="background:var(--brand-light);border-color:var(--brand)">
      <div class="card-title" style="color:var(--brand-dark)">💳 Como realizar o pagamento</div>
      <p style="font-size:14px;color:var(--brand-dark);line-height:1.8;margin-bottom:14px">
        Prezado(a) <strong>${f.clienteNome||'cliente'}</strong>, segue abaixo os dados para pagamento:
      </p>
      <div style="background:white;border-radius:8px;padding:14px 16px;margin-bottom:12px;border:1px solid rgba(216,90,48,.2)">
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px">🔵 PIX — Chave CNPJ</div>
        <div style="font-size:18px;font-weight:800;color:var(--brand);letter-spacing:1px;font-family:monospace">20.467.637/0001-08</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Banco Santander • Titular: Choko Pet Shop</div>
      </div>
      <div style="font-size:13px;color:var(--brand-dark);line-height:1.7;background:rgba(216,90,48,.08);border-radius:8px;padding:12px 14px">
        📅 <strong>Vencimento:</strong> até o 5º dia útil do mês seguinte<br/>
        📲 <strong>Após o pagamento:</strong> envie o comprovante pelo WhatsApp para que possamos confirmar a baixa<br/>
        💳 <strong>Outras formas:</strong> Dinheiro • Débito • Crédito (consulte disponibilidade)
      </div>
    </div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;text-align:center">
      <p style="font-size:14px;color:var(--text);line-height:1.8;margin-bottom:16px">
        Agradecemos pela sua parceria e confiança! 🙏<br/>
        Qualquer dúvida, estamos à disposição.
      </p>
      <a href="https://wa.me/5511992115432?text=Olá!%20Estou%20enviando%20o%20comprovante%20de%20pagamento%20da%20fatura." 
         target="_blank"
         style="display:inline-flex;align-items:center;gap:8px;background:#25D366;color:white;font-size:14px;font-weight:700;padding:12px 24px;border-radius:99px;text-decoration:none">
        💬 Enviar comprovante pelo WhatsApp
      </a>
    </div>

    <div class="footer">
      Choko Pet Shop • Fatura gerada automaticamente pelo sistema de gestão<br/>
      Em caso de dúvidas, entre em contato com o estabelecimento.
    </div>`;

  document.title = `Fatura ${f.clienteNome} — ${mesLabel} — Choko Pet Shop`;
}

function mostrarErro(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('content');
  el.style.display = 'block';
  el.innerHTML = `<div class="error"><div class="icon">😕</div><p>${msg}</p></div>`;
}

carregar();
</script>
</body>
</html>
