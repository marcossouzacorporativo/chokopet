<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chokopet — Sistema de Agendamento</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #D85A30;
      --brand-dark: #993C1D;
      --brand-light: #FAECE7;
      --brand-mid: #F0997B;
      --accent: #1D9E75;
      --accent-light: #E1F5EE;
      --info: #378ADD;
      --info-light: #E6F1FB;
      --warn: #BA7517;
      --warn-light: #FAEEDA;
      --danger: #E24B4A;
      --danger-light: #FCEBEB;
      --bg: #F7F5F0;
      --surface: #FFFFFF;
      --border: #E2DED8;
      --text: #2C2C2A;
      --text-muted: #888780;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ===== LAYOUT ===== */
    .app { display: flex; min-height: 100vh; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 240px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 10px; padding: 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo-icon {
      width: 40px; height: 40px; background: var(--brand); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    .logo-text { font-size: 16px; font-weight: 700; color: var(--brand); line-height: 1.1; }
    .logo-sub { font-size: 10px; color: var(--text-muted); font-weight: 400; }
    .sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
    .nav-section { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 12px 8px 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 14px; color: var(--text-muted); transition: all .15s; margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: var(--brand-light); color: var(--brand-dark); font-weight: 600; }
    .nav-item .nav-icon { font-size: 17px; flex-shrink: 0; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); }

    /* ===== MAIN CONTENT ===== */
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 18px; font-weight: 700; }
    .topbar-actions { display: flex; gap: 10px; align-items: center; }
    .content { padding: 24px; flex: 1; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer;
      border: none; transition: all .15s; white-space: nowrap;
    }
    .btn-primary { background: var(--brand); color: white; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { background: var(--bg); }
    .btn-danger { background: var(--danger-light); color: var(--danger); }
    .btn-danger:hover { background: #F7C1C1; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-success { background: var(--accent-light); color: var(--accent); }

    /* ===== CARDS ===== */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-title { font-size: 15px; font-weight: 700; }

    /* ===== STATS ===== */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; display: flex; align-items: flex-start; gap: 12px;
    }
    .stat-icon { width: 40px; height: 40px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .stat-info p { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
    .stat-info h3 { font-size: 22px; font-weight: 700; }
    .stat-info span { font-size: 11px; color: var(--accent); }

    /* ===== CALENDAR ===== */
    .calendar-wrap { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
    .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .calendar-nav { display: flex; align-items: center; gap: 8px; }
    .cal-title { font-size: 16px; font-weight: 700; min-width: 160px; text-align: center; }
    .week-grid { display: grid; grid-template-columns: 60px repeat(6, 1fr); }
    .week-header { display: grid; grid-template-columns: 60px repeat(6, 1fr); margin-bottom: 4px; }
    .week-header-cell { text-align: center; padding: 6px 4px; font-size: 11px; font-weight: 700; color: var(--text-muted); }
    .week-header-cell.today-col { color: var(--brand); }
    .time-col { font-size: 11px; color: var(--text-muted); text-align: right; padding-right: 8px; height: 48px; display: flex; align-items: flex-start; padding-top: 2px; }
    .day-col { border-left: 1px solid var(--border); position: relative; }
    .hour-row { height: 48px; border-bottom: 1px solid #f0ede8; }
    .event-block {
      position: absolute; left: 2px; right: 2px; border-radius: 5px; padding: 3px 6px;
      font-size: 11px; font-weight: 600; cursor: pointer; overflow: hidden; z-index: 2;
      transition: filter .15s;
    }
    .event-block:hover { filter: brightness(0.92); }
    .event-banho { background: var(--info-light); color: #185FA5; border-left: 3px solid var(--info); }
    .event-tosa { background: var(--warn-light); color: var(--warn); border-left: 3px solid var(--warn); }
    .event-banhotosa { background: var(--brand-light); color: var(--brand-dark); border-left: 3px solid var(--brand); }
    .event-hospedagem { background: var(--accent-light); color: #0F6E56; border-left: 3px solid var(--accent); }

    /* ===== SIDEBAR AGENDA (lado direito) ===== */
    .agenda-day { display: flex; flex-direction: column; gap: 8px; }
    .agenda-item {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 12px; display: flex; gap: 10px; align-items: flex-start; cursor: pointer;
    }
    .agenda-item:hover { border-color: var(--brand-mid); }
    .agenda-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .agenda-time { font-size: 11px; color: var(--text-muted); }
    .agenda-name { font-size: 13px; font-weight: 600; }
    .agenda-service { font-size: 11px; color: var(--text-muted); }

    /* ===== FORM / MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(44,44,42,0.45);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border-radius: var(--radius); padding: 24px;
      width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      transform: translateY(12px); transition: transform .2s; box-shadow: var(--shadow-lg);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 5px; }
    .form-control {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; color: var(--text); background: var(--surface); transition: border-color .15s;
    }
    .form-control:focus { outline: none; border-color: var(--brand); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

    /* ===== TABLE ===== */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
    td { padding: 12px 14px; border-bottom: 1px solid #f5f3ef; vertical-align: middle; }
    tr:hover td { background: #faf9f7; }
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 99px; }
    .badge-banho { background: var(--info-light); color: #185FA5; }
    .badge-tosa { background: var(--warn-light); color: var(--warn); }
    .badge-banhotosa { background: var(--brand-light); color: var(--brand-dark); }
    .badge-hospedagem { background: var(--accent-light); color: #0F6E56; }
    .badge-confirmado { background: var(--accent-light); color: #0F6E56; }
    .badge-pendente { background: var(--warn-light); color: var(--warn); }
    .badge-cancelado { background: var(--danger-light); color: var(--danger); }

    /* ===== PETS LIST ===== */
    .pet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
    .pet-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; cursor: pointer; transition: box-shadow .15s, border-color .15s;
    }
    .pet-card:hover { box-shadow: var(--shadow); border-color: var(--brand-mid); }
    .pet-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 10px; }
    .pet-avatar-dog { background: var(--brand-light); }
    .pet-avatar-cat { background: var(--warn-light); }
    .pet-name { font-size: 15px; font-weight: 700; }
    .pet-breed { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .pet-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }

    /* ===== EMPTY STATE ===== */
    .empty { text-align: center; padding: 48px; color: var(--text-muted); }
    .empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; margin-bottom: 16px; }

    /* ===== ALERT ===== */
    .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .alert-danger { background: var(--danger-light); color: var(--danger); border: 1px solid #F09595; }
    .alert-success { background: var(--accent-light); color: #0F6E56; border: 1px solid #5DCAA5; }
    .alert-warn { background: var(--warn-light); color: var(--warn); }
    .hidden { display: none !important; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--text); color: white;
      padding: 12px 18px; border-radius: var(--radius); font-size: 14px; font-weight: 600;
      box-shadow: var(--shadow-lg); z-index: 9999; transform: translateY(60px); opacity: 0;
      transition: all .25s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--accent); }
    .toast.error { background: var(--danger); }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🐾</div>
      <div>
        <div class="logo-text">Chokopet</div>
        <div class="logo-sub">Pet Shop</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <div class="nav-item active" onclick="showPage('dashboard')">
        <span class="nav-icon">📊</span> Dashboard
      </div>
      <div class="nav-item" onclick="showPage('agenda')">
        <span class="nav-icon">📅</span> Agenda
      </div>
      <div class="nav-section">Cadastros</div>
      <div class="nav-item" onclick="showPage('agendamentos')">
        <span class="nav-icon">✂️</span> Agendamentos
      </div>
      <div class="nav-item" onclick="showPage('animais')">
        <span class="nav-icon">🐶</span> Animais
      </div>
      <div class="nav-item" onclick="showPage('clientes')">
        <span class="nav-icon">👤</span> Clientes
      </div>
      <div class="nav-item" onclick="showPage('hotelzinho')">
        <span class="nav-icon">🏨</span> Hotelzinho
      </div>
      <div class="nav-section">Relatórios</div>
      <div class="nav-item" onclick="showPage('relatorios')">
        <span class="nav-icon">📈</span> Relatórios
      </div>
    </nav>
    <div class="sidebar-footer">
      Chokopet v1.0 · Sistema de gestão
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<!-- MODAL NOVO AGENDAMENTO -->
<div class="modal-overlay" id="modal-agendamento">
  <div class="modal">
    <div class="modal-title">📅 Novo Agendamento</div>
    <div id="modal-alert" class="hidden"></div>

    <div class="form-group">
      <label class="form-label">Cliente</label>
      <select class="form-control" id="ag-cliente" onchange="loadPetsByClient()">
        <option value="">Selecione o cliente...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Animal</label>
      <select class="form-control" id="ag-animal">
        <option value="">Selecione o animal...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Tipo de Serviço</label>
      <select class="form-control" id="ag-servico" onchange="updateDuration()">
        <option value="">Selecione...</option>
        <option value="banho">🚿 Banho</option>
        <option value="tosa">✂️ Tosa</option>
        <option value="banhotosa">🛁 Banho + Tosa</option>
        <option value="hospedagem">🏨 Hospedagem</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Data</label>
        <input type="date" class="form-control" id="ag-data" onchange="updateHours()" />
      </div>
      <div class="form-group">
        <label class="form-label">Horário</label>
        <select class="form-control" id="ag-hora">
          <option value="">Selecione a data primeiro</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Duração Estimada</label>
      <select class="form-control" id="ag-duracao">
        <option value="30">30 minutos</option>
        <option value="60" selected>1 hora</option>
        <option value="90">1h30</option>
        <option value="120">2 horas</option>
        <option value="150">2h30</option>
        <option value="180">3 horas</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Observações</label>
      <textarea class="form-control" id="ag-obs" rows="2" placeholder="Alergia, cuidados especiais..."></textarea>
    </div>
    <div class="form-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-agendamento')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarAgendamento()">💾 Salvar Agendamento</button>
    </div>
  </div>
</div>

<!-- MODAL NOVO ANIMAL -->
<div class="modal-overlay" id="modal-animal">
  <div class="modal">
    <div class="modal-title">🐶 Cadastrar Animal</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nome do Animal</label>
        <input type="text" class="form-control" id="pet-nome" placeholder="Ex: Rex" />
      </div>
      <div class="form-group">
        <label class="form-label">Espécie</label>
        <select class="form-control" id="pet-especie">
          <option value="cão">🐕 Cão</option>
          <option value="gato">🐈 Gato</option>
          <option value="outro">🐾 Outro</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Raça</label>
        <input type="text" class="form-control" id="pet-raca" placeholder="Ex: Labrador" />
      </div>
      <div class="form-group">
        <label class="form-label">Porte</label>
        <select class="form-control" id="pet-porte">
          <option value="P">Pequeno (P)</option>
          <option value="M">Médio (M)</option>
          <option value="G">Grande (G)</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Idade</label>
        <input type="text" class="form-control" id="pet-idade" placeholder="Ex: 2 anos" />
      </div>
      <div class="form-group">
        <label class="form-label">Dono (Cliente)</label>
        <select class="form-control" id="pet-dono"></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Observações</label>
      <textarea class="form-control" id="pet-obs" rows="2" placeholder="Vacinas em dia? Alergia? Comportamento..."></textarea>
    </div>
    <div class="form-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-animal')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarAnimal()">💾 Salvar Animal</button>
    </div>
  </div>
</div>

<!-- MODAL NOVO CLIENTE -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-title">👤 Cadastrar Cliente</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nome Completo</label>
        <input type="text" class="form-control" id="cli-nome" placeholder="Nome do cliente" />
      </div>
      <div class="form-group">
        <label class="form-label">Telefone / WhatsApp</label>
        <input type="text" class="form-control" id="cli-tel" placeholder="(11) 99999-9999" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" class="form-control" id="cli-email" placeholder="email@exemplo.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Endereço</label>
      <input type="text" class="form-control" id="cli-end" placeholder="Rua, número, bairro" />
    </div>
    <div class="form-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-cliente')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarCliente()">💾 Salvar Cliente</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// =============================================
// DADOS (localStorage = banco de dados local)
// =============================================
const DB = {
  get: (k) => JSON.parse(localStorage.getItem('chokopet_' + k) || '[]'),
  set: (k, v) => localStorage.setItem('chokopet_' + k, JSON.stringify(v)),
  nextId: (arr) => arr.length ? Math.max(...arr.map(x => x.id)) + 1 : 1
};

// Dados de exemplo para demonstração
function initDemoData() {
  if (DB.get('clientes').length > 0) return;
  const clientes = [
    { id: 1, nome: 'Ana Souza', tel: '(11) 98765-4321', email: 'ana@email.com', end: 'Rua das Flores, 100' },
    { id: 2, nome: 'Carlos Lima', tel: '(11) 99123-4567', email: 'carlos@email.com', end: 'Av. Principal, 200' },
    { id: 3, nome: 'Maria Santos', tel: '(11) 97654-3210', email: 'maria@email.com', end: 'Rua Verde, 50' },
  ];
  const animais = [
    { id: 1, nome: 'Bolinha', especie: 'cão', raca: 'Poodle', porte: 'P', idade: '3 anos', dono: 1, obs: 'Dócil' },
    { id: 2, nome: 'Thor', especie: 'cão', raca: 'Golden Retriever', porte: 'G', idade: '2 anos', dono: 2, obs: 'Bravo com estranhos' },
    { id: 3, nome: 'Mia', especie: 'gato', raca: 'Persa', porte: 'P', idade: '1 ano', dono: 3, obs: 'Alérgica a amoxicilina' },
    { id: 4, nome: 'Rex', especie: 'cão', raca: 'Bulldog', porte: 'M', idade: '4 anos', dono: 1, obs: '' },
  ];
  const hoje = new Date();
  const dStr = (d) => d.toISOString().split('T')[0];
  const amanha = new Date(hoje); amanha.setDate(hoje.getDate()+1);
  const semana = new Date(hoje); semana.setDate(hoje.getDate()+2);

let currentPage = 'dashboard';
function showPage(page) {

// =============================================
// AGENDA (calendário semanal)
// =============================================
let agendaWeekStart = null;
function getWeekStart(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  return dt;
}
function renderAgenda(c, actions) {
  if (!agendaWeekStart) agendaWeekStart = getWeekStart(new Date());
  actions.innerHTML = `<button class="btn btn-primary" onclick="openModal('modal-agendamento')">+ Novo Agendamento</button>`;
  buildAgendaHTML(c);
}
function buildAgendaHTML(c) {
  const ws = new Date(agendaWeekStart);
  const days = [];
  const DIAS = ['Seg','Ter','Qua','Qui','Sex','Sáb'];
  for (let i=0; i<6; i++) { const d = new Date(ws); d.setDate(ws.getDate()+i); days.push(d); }
  const hj = hoje();
  const ags = DB.get('agendamentos');
  const HOURS = [];
  for (let h=9; h<=17; h++) HOURS.push(h);

  let headerCols = `<div class="week-header-cell"></div>`;
  days.forEach((d,i) => {
    const ds = d.toISOString().split('T')[0];
    const isToday = ds === hj;
    const num = d.getDate();
    const mes = d.toLocaleDateString('pt-BR',{month:'short'});
    headerCols += `<div class="week-header-cell${isToday?' today-col':''}">${DIAS[i]}<br><strong style="font-size:15px">${num}</strong> ${mes}</div>`;
  });

  let gridRows = '';
  HOURS.forEach(h => {
    gridRows += `<div class="time-col">${h}:00</div>`;
    days.forEach(d => {
      const ds = d.toISOString().split('T')[0];
      const events = ags.filter(a => a.data === ds && parseInt(a.hora.split(':')[0]) === h);
      let evHTML = '';
      events.forEach(ev => {
        const topPct = (parseInt(ev.hora.split(':')[1])/60)*100;
        const heightPct = (ev.duracao/60)*100;
        evHTML += `<div class="event-block event-${ev.servico}"
          style="top:${topPct}%;height:${Math.max(heightPct,30)}%"
          title="${nomeAnimal(ev.animalId)} — ${SERVICOS[ev.servico]}"
          onclick="alertEventDetail(${ev.id})">
          <span>${ev.hora}</span><br>${nomeAnimal(ev.animalId)}
        </div>`;
      });
      gridRows += `<div class="day-col"><div class="hour-row">${evHTML}</div></div>`;
    });
  });

  const fmt = (d) => d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  c.innerHTML = `
    <div class="calendar-header">
      <div class="calendar-nav">
        <button class="btn btn-outline btn-sm" onclick="changeWeek(-1)">← Anterior</button>
        <span class="cal-title">${fmt(days[0])} — ${fmt(days[5])}</span>
        <button class="btn btn-outline btn-sm" onclick="changeWeek(1)">Próxima →</button>
      </div>
      <button class="btn btn-outline btn-sm" onclick="goToday()">Hoje</button>
    </div>
    <div class="card" style="overflow:hidden;padding:0">
      <div class="week-header" style="border-bottom:1px solid var(--border);padding:8px 0">${headerCols}</div>
      <div style="overflow-y:auto;max-height:480px">
        <div class="week-grid">${gridRows}</div>
      </div>
    </div>`;
}
function changeWeek(dir) {
  agendaWeekStart = new Date(agendaWeekStart);
  agendaWeekStart.setDate(agendaWeekStart.getDate() + dir * 7);
  buildAgendaHTML(document.getElementById('content'));
}
function goToday() {
  agendaWeekStart = getWeekStart(new Date());
  buildAgendaHTML(document.getElementById('content'));
}
function alertEventDetail(id) {
  const a = DB.get('agendamentos').find(x=>x.id===id);
  if (!a) return;
  showToast(`${nomeAnimal(a.animalId)} — ${SERVICOS[a.servico]} às ${a.hora}`, 'success');
}

function renderAgsTable(ags) {
  if (!ags.length) return '<div class="empty"><div class="empty-icon">📅</div><p>Nenhum agendamento cadastrado</p></div>';
  return `<table>
    <tr><th>Data</th><th>Hora</th><th>Animal</th><th>Cliente</th><th>Serviço</th><th>Duração</th><th>Status</th><th></th></tr>
    ${ags.map(a=>`
      <tr>
        <td>${fmtDate(a.data)}</td>
        <td><strong>${a.hora}</strong></td>
        <td>${nomeAnimal(a.animalId)}</td>
        <td>${nomeCliente(a.clienteId)}</td>
        <td>${badgeServico(a.servico)}</td>
        <td>${a.duracao}min</td>
        <td>${badgeStatus(a.status)}</td>
        <td style="display:flex;gap:6px">
          <button class="btn btn-success btn-sm" onclick="confirmarAg(${a.id})">✅</button>
          <button class="btn btn-danger btn-sm" onclick="cancelarAg(${a.id})">✖</button>
        </td>
      </tr>`).join('')}
  </table>`;
}
function filterAgs(q) {
  const all = DB.get('agendamentos');
  const filtered = all.filter(a =>
    nomeAnimal(a.animalId).toLowerCase().includes(q.toLowerCase()) ||
    nomeCliente(a.clienteId).toLowerCase().includes(q.toLowerCase())
  );
  document.getElementById('ags-table').innerHTML = renderAgsTable(filtered);
}
function confirmarAg(id) {
  const ags = DB.get('agendamentos');
  const i = ags.findIndex(a=>a.id===id);
  if (i > -1) { ags[i].status = 'confirmado'; DB.set('agendamentos', ags); renderPage('agendamentos'); showToast('Agendamento confirmado!','success'); }
}
function cancelarAg(id) {
  if (!confirm('Cancelar este agendamento?')) return;
  const ags = DB.get('agendamentos');
  const i = ags.findIndex(a=>a.id===id);
  if (i > -1) { ags[i].status = 'cancelado'; DB.set('agendamentos', ags); renderPage('agendamentos'); showToast('Agendamento cancelado.','error'); }
}

function updateDuration() {
  const s = document.getElementById('ag-servico').value;
  if (!s) return;
  const def = { banho:60, tosa:90, banhotosa:120, hospedagem:1440 };
  document.getElementById('ag-duracao').value = def[s] || 60;
}

function isBusinessDay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay(); // 0=dom, 6=sab
  return day >= 1 && day <= 6; // seg a sab
}
function getBusinessHours(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  if (day === 6) return { start: 9, end: 16 }; // sábado
  return { start: 9, end: 18 }; // seg-sex
}
function getOccupiedSlots(date, excludeId=null) {
  return DB.get('agendamentos')
    .filter(a => a.data === date && a.status !== 'cancelado' && a.id !== excludeId)
    .map(a => {
      const [h,m] = a.hora.split(':').map(Number);
      const startMin = h*60+m;
      return { start: startMin, end: startMin + a.duracao };
    });
}
function updateHours() {
  const data = document.getElementById('ag-data').value;
  const sel = document.getElementById('ag-hora');
  if (!data) { sel.innerHTML = '<option>Selecione a data primeiro</option>'; return; }
  if (!isBusinessDay(data)) {
    sel.innerHTML = '<option>Domingo não disponível</option>';
    showAlert('⚠️ Domingo não é dia útil. Escolha outra data.', 'danger');
    return;
  }
  clearAlert();
  const { start, end } = getBusinessHours(data);
  const occupied = getOccupiedSlots(data);
  const duracao = parseInt(document.getElementById('ag-duracao').value) || 60;
  sel.innerHTML = '';
  let hasOption = false;
  for (let h = start; h < end; h++) {
    for (let m of [0, 30]) {
      const totalMin = h*60+m;
      if (totalMin + duracao > end*60) continue;
      const conflict = occupied.some(o => totalMin < o.end && totalMin + duracao > o.start);
      if (!conflict) {
        const hStr = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
        sel.innerHTML += `<option value="${hStr}">${hStr}</option>`;
        hasOption = true;
      }
    }
  }
  if (!hasOption) sel.innerHTML = '<option>Nenhum horário disponível neste dia</option>';
}
function showAlert(msg, type='danger') {
  const el = document.getElementById('modal-alert');
  el.className = `alert alert-${type}`;
  el.innerHTML = msg;
}
function clearAlert() { document.getElementById('modal-alert').className='hidden'; }

function salvarAgendamento() {
  const clienteId = parseInt(document.getElementById('ag-cliente').value);
  const animalId = parseInt(document.getElementById('ag-animal').value);
  const servico = document.getElementById('ag-servico').value;
  const data = document.getElementById('ag-data').value;
  const hora = document.getElementById('ag-hora').value;
  const duracao = parseInt(document.getElementById('ag-duracao').value);
  const obs = document.getElementById('ag-obs').value;

  if (!clienteId||!animalId||!servico||!data||!hora) {
    showAlert('⚠️ Preencha todos os campos obrigatórios.'); return;
  }
  if (!isBusinessDay(data)) { showAlert('⚠️ Esta data não é um dia útil.'); return; }
  const { start, end } = getBusinessHours(data);
  const [h,m] = hora.split(':').map(Number);
  const startMin = h*60+m;
  if (startMin < start*60 || startMin + duracao > end*60) {
    showAlert('⚠️ Horário fora do expediente.'); return;
  }
  const occupied = getOccupiedSlots(data);
  const conflict = occupied.some(o => startMin < o.end && startMin + duracao > o.start);
  if (conflict) { showAlert('🚫 Este horário já está ocupado. Escolha outro.'); return; }

  const ags = DB.get('agendamentos');
  const novo = { id: DB.nextId(ags), clienteId, animalId, servico, data, hora, duracao, obs, status: 'pendente' };

  // Se for hospedagem, também criar entrada no hotelzinho
  if (servico === 'hospedagem') {
    const hosp = DB.get('hospedagens');
    const entrada = data;
    const saidaD = new Date(data); saidaD.setDate(saidaD.getDate()+1);
    const saida = saidaD.toISOString().split('T')[0];
    hosp.push({ id: DB.nextId(hosp), animalId, clienteId, entrada, saida, obs, status:'ativo' });
    DB.set('hospedagens', hosp);
  }

  ags.push(novo);
  DB.set('agendamentos', ags);
  closeModal('modal-agendamento');
  showToast('✅ Agendamento salvo com sucesso!', 'success');
  renderPage(currentPage);
}

// =============================================
// MODAL ANIMAL

function salvarAnimal() {
  const nome = document.getElementById('pet-nome').value.trim();
  const especie = document.getElementById('pet-especie').value;
  const raca = document.getElementById('pet-raca').value.trim();
  const porte = document.getElementById('pet-porte').value;
  const idade = document.getElementById('pet-idade').value.trim();
  const dono = parseInt(document.getElementById('pet-dono').value);
  const obs = document.getElementById('pet-obs').value.trim();
  if (!nome || !dono) { alert('Informe o nome e o dono do animal.'); return; }
  const animais = DB.get('animais');
  animais.push({ id: DB.nextId(animais), nome, especie, raca, porte, idade, dono, obs });
  DB.set('animais', animais);
  closeModal('modal-animal');
  showToast('🐾 Animal cadastrado!', 'success');
  renderPage(currentPage);
}

// =============================================
// MODAL CLIENTE
// =============================================
function salvarCliente() {
  const nome = document.getElementById('cli-nome').value.trim();
  const tel = document.getElementById('cli-tel').value.trim();
  const email = document.getElementById('cli-email').value.trim();
  const end = document.getElementById('cli-end').value.trim();
  if (!nome || !tel) { alert('Informe nome e telefone.'); return; }
  const clientes = DB.get('clientes');
  clientes.push({ id: DB.nextId(clientes), nome, tel, email, end });
  DB.set('clientes', clientes);
  closeModal('modal-cliente');
  showToast('👤 Cliente cadastrado!', 'success');
  renderPage(currentPage);
}

// =============================================
// TOAST
// =============================================
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

// =============================================
// INIT
// =============================================
renderPage('dashboard');
</script>
